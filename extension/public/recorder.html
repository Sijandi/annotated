<!DOCTYPE html>
<html>
<head>
<title>Record</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #18181b; color: #f4f4f5; font-family: system-ui; padding: 12px; }
  button { background: #27272a; color: #f4f4f5; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; width: 100%; margin: 4px 0; }
  button:hover { background: #3f3f46; }
  #record-btn { background: rgba(239,68,68,0.2); color: #f87171; }
  #done-btn { display: none; background: #166534; }
  #status { text-align: center; font-size: 12px; color: #a1a1aa; margin-bottom: 8px; }
  .recording { color: #f87171; }
  .done { color: #4ade80; }
</style>
</head>
<body>
<div id="status">Tap to record</div>
<button id="record-btn">Start</button>
<button id="done-btn">Use Recording</button>
<script src="recorder.js"></script>
</body>
</html>
